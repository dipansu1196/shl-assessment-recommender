services:
  - type: web
    name: shl-assessment-recommender
    runtime: python311
    plan: free
    # Build: install deps, then download model to cache
    buildCommand: pip install --no-cache-dir -r requirements.txt && python build.py
    # Start: single worker, lazy loading, memory optimized
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop --http httptools --timeout-keep-alive 5
    envVars:
      - key: GROQ_API_KEY
        scope: run
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PIP_NO_CACHE_DIR
        value: "1"
