services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    buildCommand: |
      pip install --index-url https://download.pytorch.org/whl/cpu torch
      pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: GROQ_API_KEY
        sync: false
